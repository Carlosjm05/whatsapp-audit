# ═══════════════════════════════════════════════════════════════
# CONFIGURACIÓN NGINX — WhatsApp Audit Dashboard
# ═══════════════════════════════════════════════════════════════
# Este archivo asume que DOMAIN apunta a este servidor.
# En el primer arranque (sin SSL todavía):
#   1. Reemplaza panel.tudominio.com por tu dominio real abajo.
#   2. Arranca solo los servicios HTTP: docker compose up -d nginx
#   3. Emite certificado:
#        docker compose run --rm certbot certonly --webroot \
#          -w /var/www/certbot -d panel.tudominio.com \
#          --email tu@email.com --agree-tos --no-eff-email
#   4. Descomenta el bloque HTTPS y recarga: docker compose exec nginx nginx -s reload
# ═══════════════════════════════════════════════════════════════

# ─── HTTP → HTTPS (redirect) + ACME challenge ────────────────
server {
    listen 80;
    listen [::]:80;
    server_name panel.tudominio.com;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás va a HTTPS (descomentar después de emitir cert)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Mientras no hay SSL, servir directamente (remover cuando SSL esté listo)
    location / {
        proxy_pass http://dashboard:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /auth/ {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://api:8000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }
}

