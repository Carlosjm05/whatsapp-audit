services:
  # ─────────────────────────────────────────────
  # BASE DE DATOS PRINCIPAL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wa_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_audit}
      POSTGRES_USER: ${POSTGRES_USER:-wa_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error - POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wa_admin} -d ${POSTGRES_DB:-whatsapp_audit}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # COLA DE TAREAS Y CACHÉ
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wa_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?error - REDIS_PASSWORD is required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # EXTRACTOR DE WHATSAPP (Node.js + Baileys)
  # ─────────────────────────────────────────────
  extractor:
    build:
      context: ./extractor
      dockerfile: Dockerfile
    container_name: wa_extractor
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-whatsapp_audit}
      - POSTGRES_USER=${POSTGRES_USER:-wa_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATA_DIR=/app/data
      - SESSION_PATH=/app/auth_state
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SYNC_TIMEOUT_MS=${SYNC_TIMEOUT_MS:-180000}
      - EXTRACTION_DELAY_MIN=${EXTRACTION_DELAY_MIN:-2000}
      - EXTRACTION_DELAY_MAX=${EXTRACTION_DELAY_MAX:-4000}
      - MEDIA_DELAY_MIN=${MEDIA_DELAY_MIN:-3000}
      - MEDIA_DELAY_MAX=${MEDIA_DELAY_MAX:-6000}
      - MEDIA_CONCURRENCY=${MEDIA_CONCURRENCY:-5}
      - MAX_RETRIES=${MAX_RETRIES:-3}
    volumes:
      - ./data:/app/data
      - extractor_session:/app/auth_state
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Healthcheck: auth_state/creds.json existe tras escanear QR.
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/auth_state/creds.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # TRANSCRIPTOR DE AUDIOS (Python + Whisper API)
  # ─────────────────────────────────────────────
  transcriber:
    build:
      context: ./transcriber
      dockerfile: Dockerfile
    container_name: wa_transcriber
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY:?error - OPENAI_API_KEY is required}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-whatsapp_audit}
      - POSTGRES_USER=${POSTGRES_USER:-wa_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATA_DIR=/app/data
      - TRANSCRIBER_WORKERS=${TRANSCRIBER_WORKERS:-3}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.80}
      - WHISPER_TIMEOUT_SECONDS=${WHISPER_TIMEOUT_SECONDS:-120}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # ANALIZADOR CON IA (Python + Claude API)
  # ─────────────────────────────────────────────
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: wa_analyzer
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?error - ANTHROPIC_API_KEY is required}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-whatsapp_audit}
      - POSTGRES_USER=${POSTGRES_USER:-wa_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATA_DIR=/app/data
      - ANALYZER_WORKERS=${ANALYZER_WORKERS:-2}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # API BACKEND (FastAPI)
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: wa_api
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-whatsapp_audit}
      - POSTGRES_USER=${POSTGRES_USER:-wa_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET:?error - JWT_SECRET is required}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-8}
      - ADMIN_USER=${ADMIN_USER:?error - ADMIN_USER is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?error - ADMIN_PASSWORD is required}
      - DOMAIN=${DOMAIN:-}
      - CORS_EXTRA_ORIGINS=${CORS_EXTRA_ORIGINS:-}
      - STRICT_CONFIG=${STRICT_CONFIG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    # Usa Python para el healthcheck (curl no está en la imagen python:slim).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # DASHBOARD (Next.js / React)
  # ─────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: wa_dashboard
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # REVERSE PROXY + SSL
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: wa_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_started
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # CERTBOT (SSL automático)
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: wa_certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  extractor_session:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

networks:
  internal:
    driver: bridge
